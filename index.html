<!DOCTYPE html>
<html>
<head>
    <title>Cat Dash</title>
    <meta charset="UTF-8">
    <link rel="icon" href="data:;base64,iVBORwOKGO=" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>    
    <h1 class="page-title">Cat Dash</h1>
    <div class="dashboard">
        <section id="description" class="panel"></section>
        <section id="bubbleMap" class="panel"></section>
        <section id="radialChart" class="panel">
            <h4 id="radial-title">Average Distance (m) Travelled Per Hour</h4>
        </section>
        <section id="scatterplot" class="panel vis">
            <!-- <p id="splot-header">Scatterplot</p> -->
            <div class="vis">
            </div>
        </section>
    </div>
    
    <!-- D3 bundle -->
    <script src="js/d3.v6.min.js"></script>
    
    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Dashboard components -->
    <script src="js/components/description.js"></script>
    <script src="js/components/bubbleMap.js"></script>
    <script src="js/components/radialChart.js"></script>
    <script src="js/components/scatterplot.js"></script>

    <!-- Our JS code -->
    <script src="js/main.js"></script>
</body>
</html>
