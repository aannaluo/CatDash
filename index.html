<!DOCTYPE html>
<html>
<head>
    <title>Cat Dash</title>
    <meta charset="UTF-8">
    <!-- <link rel="icon" href="data:;base64,iVBORwOKGO=" /> -->
     <link rel="icon", href="./images/cat-icon.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>    
    <div class="dashboard">
        <section id="interactive">
            <section id="bee" class="panel vis">
                <!-- <h4 id="radial-title">Home Range (km^2) vs Age</h4> -->
                <div class="vis">
                    <div id="gender-legend" class="legend"></div>
                    <div id="neutered-legend" class="legend"></div>
                    <div id="bee1"></div>
                    <div id="bee2"></div>
                    <div id="bee3"></div>
                    <div id="bee4"></div>    
                    <div id="bee5"></div>
                    <div id="tooltip"></div>
                    <p></p>
                </div>
            </section>
            <section id="histogram" class="panel vis">
                <div id="barchart"></div>
                <div id="line-chart"></div>
            </section>
        </section>
        <section id="individual-cat-data">
            <section id="title"></section>
            <section id="cat-profile"></section>
            <section id="cat-map" class="panel"></section>
        </section>
         <section id="heatmap">
            <div id="heatmap-sort">
            <label id="sort-select-label" for="sort-select-heatmap">Sort by: </label>
            <select id="sort-select-heatmap">
                <option value="alphabetical" selected>Alphabetical</option>
                <option value="tot-dist-dsc">Total Distance: High to Low</option>
                <option value="tot-dist-asc">Total Distance: Low to High</option>
                <option value="avg-dist-dsc">Avg Distance: High to Low</option>
                <option value="avg-dist-asc">Avg Distance: Low to High</option>
                <option value="homerange-desc">Homerange: High to Low</option>
            </select>
            </div>
            <!-- <div id="heatmap"></div> -->
         </section>
    </div>
    
    <!-- D3 bundle -->
    <script src="js/d3.v6.min.js"></script>
    <script src="https://d3js.org/d3-voronoi.v1.min.js"></script>
    
    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Dashboard components -->
    <script src="js/components/lineChart.js"></script>
    <script src="js/components/beeswarm.js"></script>
    <script src="js/components/beeLegend.js"></script>
    <script src="js/components/genderLegend.js"></script>
    <script src="js/components/barchart.js"></script>
    <script src="js/components/catMap.js"></script>
    <script src="js/components/catProfile.js"></script>
    <script src="js/components/title.js"></script>
    <script src="js/components/radialChart.js"></script>
    <script src="js/components/heatMap.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-scale-chromatic@3"></script>

    <!-- Our JS code -->
    <script src="js/main.js"></script>
</body>
</html>
