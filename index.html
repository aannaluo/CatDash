<!DOCTYPE html>
<html>
<head>
    <title>Cat Dash</title>
    <meta charset="UTF-8">
    <link rel="icon" href="data:;base64,iVBORwOKGO=" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>    
    <div class="dashboard">
        <section id="heatmap"></section>
        <section id="interactive">
            <section id="scatterplot" class="panel vis">
                <h4 id="radial-title">Home Range (km^2) vs Age</h4>
                <div class="vis">
                    <div id="legend">
                        <div id="radio-buttons">
                            <div class="radio-button-group Male">
                                <div class="radio-button Male"></div>
                                <p class="radio-button-label Male">Male</p>
                            </div>
                            <div class="radio-button-group Female">
                                <div class="radio-button Female"></div>
                                <p class="radio-button-label Female">Female</p>
                            </div>
                        </div>
                        <div id="icons">
                            <div class="icon-group Neutered">
                                <div class="icon Neutered"></div>
                                <p class="icon-label Neutered">Neutered</p>
                            </div>
                            <div class="icon-group Not-Neutered">
                                <div class="icon Not-Neutered"></div>
                                <p class="icon-label Not-Neutered">Not Neutered</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <section id="histogram"></section>
        </section>
        <section id="individual-cat-data">
            <section id="cat-profile"></section>
            <section id="radialChart" class="panel">
                <h4 id="radial-title">Average Distance (m) Travelled Per Hour</h4>
            </section>
            <section id="bubbleMap" class="panel"></section>
       
        </section>
    </div>
    
    <!-- D3 bundle -->
    <script src="js/d3.v6.min.js"></script>
    
    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Dashboard components -->
    <script src="js/components/description.js"></script>
    <script src="js/components/bubbleMap.js"></script>
    <script src="js/components/radialChart.js"></script>
    <script src="js/components/scatterplot.js"></script>

    <!-- Our JS code -->
    <script src="js/main.js"></script>
</body>
</html>
