<!DOCTYPE html>
<html>
<head>
    <title>Cat Dash</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- <link rel="icon" href="data:;base64,iVBORwOKGO=" /> -->
     <link rel="icon", href="./images/cat-icon.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Life+Savers&display=swap" rel="stylesheet">
</head>
<body>    
    <div class="dashboard">
        <section id="interactive">
            <section id="bee" class="panel vis">
                <!-- <h4 id="radial-title">Home Range (km^2) vs Age</h4> -->
                <div class="vis">
                    <div id="legend">
                        <!-- <div id="radio-buttons">
                            <div class="radio-button-group Male">
                                <div class="radio-button Male"></div>
                                <p class="radio-button-label Male">Male</p>
                            </div>
                            <div class="radio-button-group Female">
                                <div class="radio-button Female"></div>
                                <p class="radio-button-label Female">Female</p>
                            </div>
                        </div> -->
                        <!-- <div id="icons">
                            <div class="icon-group Neutered">
                                <div class="icon Neutered"></div>
                                <p class="icon-label Neutered">Neutered</p>
                            </div>
                            <div class="icon-group Not-Neutered">
                                <div class="icon Not-Neutered"></div>
                                <p class="icon-label Not-Neutered">Not Neutered</p>
                            </div>
                        </div> -->
                    </div>
                    <div id="bee1"></div>
                    <div id="bee2"></div>
                    <div id="bee3"></div>
                    <div id="bee4"></div>    
                    <div id="bee5"></div>
                    <div id="tooltip"></div>
                    <div>
                        
                    </div>
                    <p></p>
                </div>
            </section>
            <section id="histogram" class="panel vis">
                <div id="barchart"></div>
            </section>
        </section>
        <section id="individual-cat-data">
            <section id="title"></section>
            <section id="cat-profile"></section>
            <section id="cat-map" class="panel"></section>
        </section>
         <section id="heatmap">
            <h5 class="heatmap-title">Distance Travelled Per Day by Cat</h5>
            <div id="heatmap-sort">
            <label class="heatmap-sort-label" id="sort-select-label" for="sort-select-heatmap">Sort by: </label>
            <select class="form-select form-select-sm" aria-label="Small select example" id="sort-select-heatmap">
                <option value="alphabetical" selected>Alphabetical</option>
                <option value="tot-dist-dsc">Total Distance: High to Low</option>
                <option value="tot-dist-asc">Total Distance: Low to High</option>
                <option value="avg-dist-dsc">Avg Distance: High to Low</option>
                <option value="avg-dist-asc">Avg Distance: Low to High</option>
                <option value="homerange-desc">Homerange: High to Low</option>
            </select>
            </div>
            <!-- <div id="heatmap"></div> -->
         </section>
    </div>
    
    <!-- D3 bundle -->
    <script src="js/d3.v6.min.js"></script>
    <script src="https://d3js.org/d3-voronoi.v1.min.js"></script>
    
    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Dashboard components -->
    <script src="js/components/beeswarm.js"></script>
    <script src="js/components/barchart.js"></script>
    <script src="js/components/catMap.js"></script>
    <script src="js/components/catProfile.js"></script>
     <script src="js/components/title.js"></script>
    <script src="js/components/radialChart.js"></script>
    <script src="js/components/heatMap.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-scale-chromatic@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- Our JS code -->
    <script src="js/main.js"></script>
